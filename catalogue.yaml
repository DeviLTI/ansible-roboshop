- name: catalogue configuration
  hosts: catalogue
  become: yes
  tasks:
    - name: disabling nodejs
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enabling required version of nodejs
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: installing nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present
      
    - name: creating systemuser
      ansible.builtin.user:
        name: roboshop
        shell: /sbin/nologin
        system: yes
        home: /app

    - name: creating app directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: downloading the code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip
     #this module think like the file is exist in ansible control server  so it need to extract from there to remote machine
     #remote_src: yes means file already exist in catalouge server(remote server)
    - name: extracting the code
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes #files already exist in remote servre
    - name: installing dependencies
      community.general.npm:
        path: /app

    - name: copying service
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

    - name: daemon reload
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: enable and start service
      ansible.builtin.service:
        name: catalogue
        state: started
        enabled: yes

    - name: copying mongodb repo
      ansible.builtin.copy:
        src: mongodb.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: installing mongodb client
      ansible.builtin.dnf:
        name: mongodb-mongosh
        state: present

    - name: loading data
      ansible.builtin.command: mongosh --host mongodb.daws23.space --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogueoutput

    - name: catalogue output
      ansible.builtin.debug:
        msg: "{{ catalogueoutput }}"
